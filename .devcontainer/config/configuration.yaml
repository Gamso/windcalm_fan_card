homeassistant:
  name: Windcalm DevContainer
  latitude: 48.8566
  longitude: 2.3522
  elevation: 0
  unit_system: metric
  country: FR
  time_zone: Europe/Paris
  language: fr

default_config:

logger:
  default: warning
  logs:
    homeassistant.components.lovelace: info

lovelace:
  resource_mode: yaml
  resources:
    - url: /local/windcalm_card/windcalm-fan-card.js?v=7
      type: module
  dashboards:
    lovelace-windcalm:
      mode: yaml
      filename: ui-lovelace.yaml
      title: Windcalm Dev
      icon: mdi:fan
      show_in_sidebar: true

# ── Backing helpers ───────────────────────────────────────────────────────────

input_number:
  wc_fan_speed_backing:
    name: "Windcalm – Fan speed % (backing)"
    min: 0
    max: 100
    step: 1
    initial: 0
    icon: mdi:speedometer
  wc_timer_backing:
    name: "Windcalm – Timer minutes (backing)"
    min: 0
    max: 480
    step: 1
    initial: 0
    icon: mdi:timer
  wc_light_kelvin_backing:
    name: "Windcalm – Light color temp K (backing)"
    min: 3000
    max: 6500
    step: 100
    initial: 3000
    icon: mdi:temperature-kelvin

input_boolean:
  wc_light_backing:
    name: "Windcalm – Light (backing)"
    icon: mdi:lightbulb
    initial: false
  wc_sound_backing:
    name: "Windcalm – Sound beep (backing)"
    icon: mdi:volume-high
    initial: false

input_select:
  wc_fan_direction_backing:
    name: "Windcalm – Fan direction (backing)"
    options:
      - "forward"
      - "reverse"
    initial: "forward"
    icon: mdi:rotate-right

# ── Template entities ─────────────────────────────────────────────────────────

template:
  - fan:
      # fan.ceiling_fan_with_light
      # State derived from speed: on when speed > 0, off when speed = 0
      - name: "ceiling fan with light"
        unique_id: ceiling_fan_with_light
        state: "{{ 'on' if states('input_number.wc_fan_speed_backing') | int > 0 else 'off' }}"
        percentage: "{{ states('input_number.wc_fan_speed_backing') | int }}"
        direction: "{{ states('input_select.wc_fan_direction_backing') }}"
        speed_count: 6
        turn_on:
          service: input_number.set_value
          target:
            entity_id: input_number.wc_fan_speed_backing
          data:
            value: 17
        turn_off:
          service: input_number.set_value
          target:
            entity_id: input_number.wc_fan_speed_backing
          data:
            value: 0
        set_percentage:
          service: input_number.set_value
          target:
            entity_id: input_number.wc_fan_speed_backing
          data:
            value: "{{ percentage }}"
        set_direction:
          service: input_select.select_option
          target:
            entity_id: input_select.wc_fan_direction_backing
          data:
            option: "{{ direction }}"

  - number:
      # number.ceiling_fan_with_light_minuteur
      - name: "ceiling fan with light minuteur"
        unique_id: ceiling_fan_with_light_minuteur
        state: "{{ states('input_number.wc_timer_backing') | int }}"
        min: 0
        max: 480
        step: 1
        set_value:
          service: input_number.set_value
          target:
            entity_id: input_number.wc_timer_backing
          data:
            value: "{{ value }}"

  - switch:
      # switch.ceiling_fan_with_light_son
      - name: "ceiling fan with light son"
        unique_id: ceiling_fan_with_light_son
        state: "{{ states('input_boolean.wc_sound_backing') }}"
        turn_on:
          service: input_boolean.turn_on
          target:
            entity_id: input_boolean.wc_sound_backing
        turn_off:
          service: input_boolean.turn_off
          target:
            entity_id: input_boolean.wc_sound_backing

# ── Legacy template light (color_temp support) ────────────────────────────────
# The modern `template:` integration has no light platform, so the simulated
# light.ceiling_fan_with_light uses the legacy template light platform, which
# supports color temperature. Mireds = 1,000,000 / Kelvin.
#   3000 K  -> 333 mireds (warm) ; 6500 K -> 154 mireds (cool)
light:
  - platform: template
    lights:
      ceiling_fan_with_light:
        unique_id: ceiling_fan_with_light_light
        friendly_name: "Ceiling fan with light"
        value_template: "{{ states('input_boolean.wc_light_backing') }}"
        temperature_template: >
          {{ (1000000 / (states('input_number.wc_light_kelvin_backing') | float(3000))) | round | int }}
        min_mireds: 154
        max_mireds: 333
        turn_on:
          service: input_boolean.turn_on
          target:
            entity_id: input_boolean.wc_light_backing
        turn_off:
          service: input_boolean.turn_off
          target:
            entity_id: input_boolean.wc_light_backing
        set_temperature:
          service: input_number.set_value
          target:
            entity_id: input_number.wc_light_kelvin_backing
          data:
            value: "{{ (1000000 / color_temp) | round | int }}"
